name: Fortify on Demand PR Automation

on:
  push:
    branches: [master, dev]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE'
      - '.gitignore'
      - 'provisioning'
      - '.sonarcloud.properties'
      - 'LICENSE'
      - 'Vagrantfile'
  pull_request:
    branches: [master, dev]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE'
      - '.gitignore'
      - 'provisioning'
      - '.sonarcloud.properties'
      - 'LICENSE'
      - 'Vagrantfile'

concurrency:
  group: fortify-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  security-events: write

jobs:
  fortify-fod:
    # Repository secrets are not available to workflows triggered from fork PRs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: fortify-fod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Run Fortify on Demand scan
        uses: fortify/github-action@v2
        with:
          sast-scan: true
        env:
          FOD_URL: https://ams.fortify.com
          FOD_TENANT: ${{ secrets.FOD_TENANT }}
          FOD_USER: ${{ secrets.FOD_USER }}
          FOD_PASSWORD: ${{ secrets.FOD_PAT }}
          FOD_RELEASE: ${{ github.repository }}:${{ github.head_ref || github.ref_name }}
          DO_SETUP: true
          SETUP_EXTRA_OPTS: >-
            --copy-from "${{ github.repository }}:${{ github.base_ref || github.event.repository.default_branch }}"
          PACKAGE_EXTRA_OPTS: -bt mvn
          DO_WAIT: true
          DO_JOB_SUMMARY: true
          DO_EXPORT: true
          DO_PR_COMMENT: ${{ github.event_name == 'pull_request' }}
