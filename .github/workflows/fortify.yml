name: Fortify FoD Scan and Aviator Remediation

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE'
      - '.gitignore'
      - 'provisioning'
      - '.sonarcloud.properties'
      - 'LICENSE'
      - 'Vagrantfile'
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - '**.md'
      - '.github/ISSUE_TEMPLATE'
      - '.gitignore'
      - 'provisioning'
      - '.sonarcloud.properties'
      - 'LICENSE'
      - 'Vagrantfile'
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to scan and remediate; leave blank to use the selected branch
        required: false
        default: ''

concurrency:
  group: fortify-${{ github.workflow }}-${{ github.head_ref || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  resolve-pr-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      has_pr_context: ${{ steps.resolve.outputs.has_pr_context }}
      is_same_repo_pr: ${{ steps.resolve.outputs.is_same_repo_pr }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      run_remediation: ${{ steps.resolve.outputs.run_remediation }}
    steps:
      - id: resolve
        name: Resolve PR context
        env:
          GH_TOKEN: ${{ github.token }}
          GH_API_URL: ${{ github.api_url }}
          WORKFLOW_DISPATCH_BRANCH: ${{ github.event.inputs.branch || '' }}
        run: |
          python <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          with open(os.environ["GITHUB_EVENT_PATH"], "r", encoding="utf-8") as fh:
              payload = json.load(fh)

          repo_full_name = os.environ["GITHUB_REPOSITORY"]
          owner, repo = repo_full_name.split("/", 1)
          event_name = os.environ["GITHUB_EVENT_NAME"]
          github_ref = os.environ.get("GITHUB_REF", "")
          checkout_ref = os.environ.get("GITHUB_SHA", "")
          default_branch = payload.get("repository", {}).get("default_branch") or "main"
          manual_branch = os.environ.get("WORKFLOW_DISPATCH_BRANCH", "").strip()
          pr = None

          if github_ref.startswith("refs/heads/"):
              base_ref = github_ref[len("refs/heads/"):]
          else:
              base_ref = default_branch

          def github_get(path: str) -> dict:
              request = urllib.request.Request(
                  f"{os.environ['GH_API_URL'].rstrip('/')}{path}",
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                      "X-GitHub-Api-Version": "2022-11-28",
                  },
              )
              try:
                  with urllib.request.urlopen(request) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode("utf-8", errors="replace")
                  print(f"Failed to query GitHub API at {path}: {details}", file=sys.stderr)
                  raise

          if event_name == "pull_request":
              pr = payload.get("pull_request")
              if pr:
                  checkout_ref = pr["head"]["sha"]
                  base_ref = pr["base"]["ref"]
          elif event_name == "workflow_dispatch":
              branch = manual_branch or base_ref
              encoded_branch = urllib.parse.quote(branch, safe="")
              branch_data = github_get(f"/repos/{owner}/{repo}/branches/{encoded_branch}")
              checkout_ref = branch_data["commit"]["sha"]
              base_ref = branch

          has_pr_context = pr is not None
          outputs = {
              "has_pr_context": str(has_pr_context).lower(),
              "pr_number": str(pr["number"]) if has_pr_context else "",
              "checkout_ref": checkout_ref,
              "base_ref": base_ref,
              "run_remediation": str(bool(base_ref)).lower(),
              "is_same_repo_pr": str(
                  pr["head"]["repo"]["full_name"] == repo_full_name if has_pr_context else True
              ).lower(),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              for key, value in outputs.items():
                  fh.write(f"{key}={value}\n")
          PY

  fortify-fod:
    needs: resolve-pr-context
    if: needs.resolve-pr-context.outputs.is_same_repo_pr == 'true'
    name: fortify-fod
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref || github.sha }}

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven

      - name: Run Fortify on Demand scan
        uses: fortify/github-action@v3
        env:
          FOD_URL: ${{ vars.FOD_URL || 'https://ams.fortify.com' }}
          FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
          FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
          FOD_TENANT: ${{ secrets.FOD_TENANT }}
          # Numeric FoD release identifier; release must already exist and be configured.
          FOD_RELEASE: ${{ secrets.FOD_RELEASE_ID }}
          PACKAGE_EXTRA_OPTS: -bt mvn
          DO_WAIT: true
          DO_JOB_SUMMARY: ${{ vars.FOD_DO_JOB_SUMMARY || 'false' }}
          # Disable GitHub Code Scanning export by default; it can add noticeable time
          # when processing large finding sets and is not required for Aviator remediation.
          DO_EXPORT: ${{ vars.FOD_DO_EXPORT || 'false' }}
          DO_DEBRICKED: true
          DO_PR_COMMENT: ${{ github.event_name == 'pull_request' }}

  fortify-aviator-remediation:
    needs: [resolve-pr-context, fortify-fod]
    if: needs.resolve-pr-context.outputs.run_remediation == 'true' && needs.resolve-pr-context.outputs.is_same_repo_pr == 'true' && needs.fortify-fod.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      FOD_BASE_URL: ${{ vars.FOD_BASE_URL || 'https://api.ams.fortify.com' }}
      FOD_CLIENT_ID: ${{ secrets.FOD_CLIENT_ID }}
      FOD_CLIENT_SECRET: ${{ secrets.FOD_CLIENT_SECRET }}
      FOD_TENANT: ${{ secrets.FOD_TENANT }}
      FOD_USER: ${{ secrets.FOD_USER }}
      FOD_PASSWORD: ${{ secrets.FOD_PASSWORD || secrets.FOD_PAT }}
      FOD_OAUTH_SCOPE: ${{ vars.FOD_OAUTH_SCOPE || 'api-tenant' }}
      FOD_RELEASE_ID: ${{ secrets.FOD_RELEASE_ID }}
      FOD_SEVERITY_STRINGS: ${{ vars.FOD_SEVERITY_STRINGS || 'Critical' }}
      FOD_VERIFY_SSL: ${{ vars.FOD_VERIFY_SSL || 'true' }}
      # Use a PAT if provided; otherwise fall back to the workflow token.
      GITHUB_TOKEN: ${{ secrets.REMEDIATION_GITHUB_TOKEN || github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PR_NUMBER: ${{ needs.resolve-pr-context.outputs.pr_number }}
      GITHUB_BASE_REF: ${{ needs.resolve-pr-context.outputs.base_ref }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-pr-context.outputs.checkout_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fortify_aviator_remediation/requirements.txt

      - name: Run Fortify Aviator remediation engine
        run: python fortify_aviator_remediation/app/remediation_engine.py
